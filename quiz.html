<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toets</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="js/app.js" defer></script>
</head>

<body class="min-h-screen bg-gradient-to-b from-blue-700 to-slate-900 text-white p-4">

<div class="max-w-md mx-auto">

<!-- HEADER -->
<div class="mb-4">
  <h1 class="text-2xl font-bold">Toets</h1>

  <div class="text-sm opacity-80 mt-2">
    Goed: <span id="good">0</span> |
    Fout: <span id="wrong">0</span><br>
    Sessies: <span id="sessions">0</span> |
    Foutloos: <span id="perfect">0</span>
  </div>
</div>

<!-- CARD -->
<div id="quiz" class="bg-white/10 backdrop-blur p-6 rounded-2xl space-y-4"></div>

<!-- NAV -->
<a href="index.html" class="block bg-white/10 text-center p-4 rounded-xl mt-4">
  ⬅️ Terug
</a>

<button onclick="resetStats()" 
  class="w-full mt-2 bg-red-500/80 p-3 rounded-xl">
  Reset statistieken
</button>

</div>
</body>
</html>
