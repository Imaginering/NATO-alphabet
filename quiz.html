<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toets</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="js/app.js" defer></script>
</head>

<body class="min-h-screen bg-gradient-to-b from-blue-700 to-slate-900 text-white p-4">

<div class="max-w-md mx-auto">

<h1 class="text-2xl font-bold mb-4">Toets</h1>

<!-- PROGRESS -->
<div class="mb-3">
  <div class="w-full bg-white/20 rounded-full h-3 overflow-hidden">
    <div id="progressBar" class="h-3 bg-green-400 w-0 transition-all duration-300"></div>
  </div>
</div>

<!-- SESSION INFO -->
<div class="bg-white/10 p-3 rounded-xl mb-3 text-sm">
  Vraag <span id="progress">1</span> / 25<br>
  Goed: <span id="sessionGood">0</span> |
  Fout: <span id="sessionWrong">0</span> |
  🔥 Streak: <span id="streak">0</span>
</div>

<!-- TOTAL -->
<div class="text-xs opacity-70 mb-3">
  Totaal goed: <span id="good">0</span> |
  Totaal fout: <span id="wrong">0</span><br>
  Toetsen: <span id="sessions">0</span> |
  Foutloos: <span id="perfect">0</span>
</div>

<!-- QUIZ -->
<div id="quiz" class="bg-white/10 backdrop-blur p-6 rounded-2xl space-y-4"></div>

<a href="index.html" class="block bg-white/10 text-center p-4 rounded-xl mt-4">
  ⬅️ Terug
</a>

<button onclick="resetStats()" class="w-full mt-2 bg-red-500/80 p-3 rounded-xl">
  Reset statistieken
</button>

</div>
</body>
</html>
