<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Open Sans", "ui-sans-serif", "system-ui", "sans-serif"]
          },
          colors: {
            brand: {
              DEFAULT: "hsl(207.69 100% 25.5%)",
              soft: "hsl(207.69 75% 93%)",
              deep: "hsl(207.69 100% 20%)"
            },
            accent: "#0093d9"
          },
          boxShadow: {
            soft: "0 10px 35px -20px hsl(207.69 100% 25.5% / 0.45)"
          }
        }
      }
    };
  </script>
  <script src="js/app.js" defer></script>
</head>
<body class="min-h-screen bg-slate-100 text-brand antialiased">
  <div class="flex min-h-screen w-full flex-col bg-white">
    <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
      <div class="bg-accent py-1.5 pr-1.5 text-xs font-bold tracking-wide text-white">
        <div class="flex w-full justify-end">
          <a
            href="https://github.com/Imaginering/NATO-alphabet/issues"
            target="_blank"
            rel="noopener noreferrer"
            title="Probleem melden"
            aria-label="Probleem melden op GitHub"
            class="group relative inline-flex h-7 w-7 items-center justify-center rounded-full text-white/75 transition hover:bg-white/15 hover:text-white"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-4 w-4 lucide lucide-message-circle-warning-icon lucide-message-circle-warning" aria-hidden="true">
              <path d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"></path>
              <path d="M12 8v4"></path>
              <path d="M12 16h.01"></path>
            </svg>
            <span class="pointer-events-none absolute right-0 top-8 hidden whitespace-nowrap rounded bg-slate-900 px-2 py-1 text-[11px] font-semibold text-white shadow-md group-hover:block">
              Probleem melden
            </span>
          </a>
        </div>
      </div>
      <div class="mx-auto w-full max-w-6xl px-4 pb-4 pt-3 md:px-8">
        <div class="md:max-w-2xl">
          <p class="text-xs font-semibold uppercase tracking-[0.16em] text-brand">NATO Spellingsalfabet</p>
          <h1 class="text-2xl font-extrabold text-brand">Quiz</h1>
        </div>
      </div>
    </header>

    <main class="flex-1 pb-28 pt-5 md:pb-10">
      <div class="mx-auto w-full max-w-6xl px-4 md:px-8">
        <section class="mb-4">
          <h2 class="mb-1 text-base font-bold text-brand">Train je kennis</h2>
          <p class="text-sm text-brand/80">Beantwoord 25 vragen en verbeter je snelheid en nauwkeurigheid.</p>
        </section>

        <section class="grid gap-4 lg:grid-cols-[300px_1fr] lg:items-start">
          <aside class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
            <p class="mb-2 text-xs font-bold uppercase tracking-wider text-brand/70">Voortgang</p>
            <div class="mb-4 h-3 overflow-hidden rounded-full bg-brand-soft">
              <div id="progressBar" class="h-3 w-0 rounded-full bg-brand transition-all duration-300"></div>
            </div>

            <div class="grid grid-cols-3 gap-2 text-center">
              <div class="rounded-xl bg-brand-soft px-2 py-2">
                <p class="text-[10px] font-bold uppercase tracking-wide text-brand/70">Vraag</p>
                <p class="text-sm font-extrabold text-brand"><span id="progress">1</span><span class="font-semibold">/25</span></p>
              </div>
              <div class="rounded-xl bg-brand-soft px-2 py-2">
                <p class="text-[10px] font-bold uppercase tracking-wide text-brand/70">Goed</p>
                <p class="text-sm font-extrabold text-brand" id="sessionGood">0</p>
              </div>
              <div class="rounded-xl bg-brand-soft px-2 py-2">
                <p class="text-[10px] font-bold uppercase tracking-wide text-brand/70">Fout</p>
                <p class="text-sm font-extrabold text-brand" id="sessionWrong">0</p>
              </div>
            </div>
          </aside>

          <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm md:p-6">
            <div class="mb-4 flex items-center justify-between border-b border-slate-200 pb-3">
              <p class="text-sm font-bold text-brand">Huidige vraag</p>
            </div>
            <div id="quiz" class="flex flex-col gap-3"></div>
          </div>
        </section>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 z-30 w-full border-t border-slate-200 bg-white/95 pb-4 pt-3 backdrop-blur md:static md:border-t md:bg-white md:pb-6 md:pt-4">
      <div class="mx-auto w-full max-w-6xl px-4 md:px-8">
        <div class="grid grid-cols-3 gap-2 text-center text-xs">
          <a href="index.html" class="rounded-xl bg-brand-soft px-2 py-2.5 font-semibold text-brand transition hover:bg-brand/15">Home</a>
          <a href="quiz.html" class="rounded-xl bg-brand px-2 py-2.5 font-semibold text-white transition hover:bg-brand-deep">Quiz</a>
          <a href="list.html" class="rounded-xl bg-brand-soft px-2 py-2.5 font-semibold text-brand transition hover:bg-brand/15">Alfabet</a>
        </div>
      </div>
    </nav>
  </div>
</body>
</html>
