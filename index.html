<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NATO Trainer</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(180deg, #1e3a8a, #0f172a);
  color: white;
  text-align: center;
}

.container { padding: 20px; }

.card {
  background: rgba(255,255,255,0.1);
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}

button {
  width: 100%;
  margin: 8px 0;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: #334155;
  color: white;
}

.correct { background: #22c55e; }
.wrong { background: #ef4444; }

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
}

.hidden { display: none; }

.alphabet {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.alphabet div {
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<h1>NATO Trainer</h1>

<div id="home" class="card">
  <h2>Hoe werkt dit?</h2>
  <p>
  1. Leer eerst het alfabet<br>
  2. Oefen door erop te klikken<br>
  3. Start daarna de toets<br><br>
  Je krijgt verschillende soorten vragen om het echt te beheersen.
  </p>

  <button onclick="showLearn()">📘 Leren</button>
  <button onclick="showQuiz()">🎯 Toets</button>
  <button onclick="showList()">📋 Alfabet</button>
</div>

<div id="learn" class="card hidden"></div>
<div id="quiz" class="card hidden"></div>
<div id="list" class="card hidden"></div>

</div>

<script>
const nato = {
A:"alfa",B:"bravo",C:"charlie",D:"delta",E:"echo",F:"foxtrot",
G:"golf",H:"hotel",I:"india",J:"juliett",K:"kilo",L:"lima",
M:"mike",N:"november",O:"oscar",P:"papa",Q:"quebec",R:"romeo",
S:"sierra",T:"tango",U:"uniform",V:"victor",W:"whiskey",
X:"x-ray",Y:"yankee",Z:"zulu"
};

let letters = Object.keys(nato);
let currentAnswer = "";
let waiting = false;

// NAVIGATIE
function hideAll(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("learn").classList.add("hidden");
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("list").classList.add("hidden");
}

function showLearn(){
  hideAll();
  const el = document.getElementById("learn");
  el.classList.remove("hidden");

  el.innerHTML = `<h2>Klik op een letter</h2>
  <div class="alphabet">
  ${letters.map(l => `<button onclick="checkLearn('${l}')">${l}</button>`).join("")}
  </div>
  <button onclick="goHome()">⬅️ Terug</button>`;
}

function checkLearn(letter){
  let answer = prompt("Wat is deze letter?");
  if(!answer) return;

  if(answer.toLowerCase() === nato[letter]){
    alert("Goed!");
  } else {
    alert("Fout! Het is: " + nato[letter]);
  }
}

function showList(){
  hideAll();
  const el = document.getElementById("list");
  el.classList.remove("hidden");

  el.innerHTML = `
    <h2>Alfabet</h2>
    <div class="alphabet">
    ${letters.map(l => `<div>${l} = ${nato[l]}</div>`).join("")}
    </div>
    <button onclick="goHome()">⬅️ Terug</button>
  `;
}

function showQuiz(){
  hideAll();
  document.getElementById("quiz").classList.remove("hidden");
  newQuestion();
}

function goHome(){
  hideAll();
  document.getElementById("home").classList.remove("hidden");
}

// QUIZ
function randomLetter(){
  return letters[Math.floor(Math.random()*letters.length)];
}

function newQuestion(){
  waiting = false;
  const type = Math.floor(Math.random()*4);
  const letter = randomLetter();
  const word = nato[letter];
  const box = document.getElementById("quiz");

  if(type === 0){
    let options = [word, nato[randomLetter()], nato[randomLetter()]]
      .sort(()=>Math.random()-0.5);

    currentAnswer = word;

    box.innerHTML = `<h2>Wat is ${letter}?</h2>` +
      options.map(o => `<button onclick="check('${o}', this)">${o}</button>`).join("");
  }

  else if(type === 1){
    currentAnswer = word;
    box.innerHTML = `
      <h2>Wat is ${letter}?</h2>
      <input id="input">
      <button onclick="checkInput()">Check</button>
    `;
  }

  else if(type === 2){
    currentAnswer = letter.toLowerCase();
    box.innerHTML = `
      <h2>Welke letter hoort bij "${word}"?</h2>
      <input id="input">
      <button onclick="checkInput()">Check</button>
    `;
  }

  else {
    let l1 = randomLetter();
    let l2 = randomLetter();
    let num = Math.floor(Math.random()*90+10);

    currentAnswer = `${nato[l1]} ${nato[l2]} ${num}`.toLowerCase();

    box.innerHTML = `
      <h2>${l1}${l2}-${num}</h2>
      <input id="input" placeholder="Typ NATO">
      <button onclick="checkInput()">Check</button>
    `;
  }
}

function check(answer, btn){
  if(waiting) return;
  waiting = true;

  if(answer.toLowerCase() === currentAnswer){
    btn.classList.add("correct");
    showResult(true);
  } else {
    btn.classList.add("wrong");
    showResult(false);
  }
}

function checkInput(){
  if(waiting) return;
  waiting = true;

  let val = document.getElementById("input").value.toLowerCase();

  if(val === currentAnswer){
    showResult(true);
  } else {
    showResult(false);
  }
}

function showResult(correct){
  const box = document.getElementById("quiz");

  box.innerHTML += `
    <h3>${correct ? "✅ Goed!" : "❌ Fout!"}</h3>
    <p>Antwoord: ${currentAnswer}</p>
    <button onclick="newQuestion()">➡️ Volgende</button>
    <button onclick="goHome()">🏠 Menu</button>
  `;
}
</script>

</body>
</html>
