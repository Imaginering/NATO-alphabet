<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NATO SpellingsalfabetTrainer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Open Sans", "ui-sans-serif", "system-ui", "sans-serif"]
          },
          colors: {
            brand: {
              DEFAULT: "hsl(207.69 100% 25.5%)",
              soft: "hsl(207.69 75% 93%)",
              deep: "hsl(207.69 100% 20%)"
            },
            accent: "#0093d9"
          },
          boxShadow: {
            soft: "0 10px 35px -20px hsl(207.69 100% 25.5% / 0.45)"
          }
        }
      }
    };
  </script>
</head>
<body class="min-h-screen bg-slate-100 text-brand antialiased">
  <div class="flex min-h-screen w-full flex-col bg-white">
    <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
      <div class="bg-accent px-4 py-2 text-xs font-bold tracking-wide text-white"></div>
      <div class="mx-auto w-full max-w-6xl px-4 pb-4 pt-3 md:px-8">
        <div class="md:max-w-2xl">
          <p class="text-xs font-semibold uppercase tracking-[0.16em] text-brand">NATO Spellingsalfabet</p>
          <h1 class="text-2xl font-extrabold text-brand">Start je training</h1>
        </div>
      </div>
    </header>

    <main class="flex-1 pb-28 pt-5 md:pb-10">
      <div class="mx-auto w-full max-w-6xl px-4 md:px-8">
        <section class="reveal translate-y-2 opacity-0 transition-all duration-500 md:max-w-2xl">
          <p class="mb-4 text-sm leading-relaxed text-brand/85">Kies een onderdeel en begin direct met je training.</p>
        </section>

        <section class="grid grid-cols-1 gap-3 md:grid-cols-2 xl:grid-cols-3">
          <a href="quiz.html" class="reveal group flex min-h-36 translate-y-2 flex-col rounded-xl border border-slate-200 bg-white p-4 opacity-0 shadow-sm transition-all duration-500 hover:-translate-y-0.5 hover:border-brand/40 hover:shadow-soft active:scale-[0.99]">
            <div class="mb-4 flex h-10 w-10 items-center justify-center rounded-lg bg-brand-soft text-brand">
              <i class="fa-solid fa-bullseye text-lg"></i>
            </div>
            <h3 class="mb-1 text-base font-bold text-brand">Quiz</h3>
            <p class="text-xs leading-relaxed text-brand/80">Test je kennis met snelle oefeningen.</p>
            <span class="mt-auto pt-3 text-sm font-semibold text-brand">Open <i class="fa-solid fa-arrow-right-long ml-1 text-xs transition-transform group-hover:translate-x-1"></i></span>
          </a>

          <a href="list.html" class="reveal group flex min-h-36 translate-y-2 flex-col rounded-xl border border-slate-200 bg-white p-4 opacity-0 shadow-sm transition-all duration-500 hover:-translate-y-0.5 hover:border-brand/40 hover:shadow-soft active:scale-[0.99]">
            <div class="mb-4 flex h-10 w-10 items-center justify-center rounded-lg bg-brand-soft text-brand">
              <i class="fa-solid fa-list-ul text-lg"></i>
            </div>
            <h3 class="mb-1 text-base font-bold text-brand">Alfabet</h3>
            <p class="text-xs leading-relaxed text-brand/80">Bekijk alle NATO-termen in een overzicht.</p>
            <span class="mt-auto pt-3 text-sm font-semibold text-brand">Open <i class="fa-solid fa-arrow-right-long ml-1 text-xs transition-transform group-hover:translate-x-1"></i></span>
          </a>
        </section>
      </div>
    </main>

    <nav class="fixed bottom-0 left-0 z-30 w-full border-t border-slate-200 bg-white/95 pb-4 pt-3 backdrop-blur md:static md:border-t md:bg-white md:pb-6 md:pt-4">
      <div class="mx-auto w-full max-w-6xl px-4 md:px-8">
        <div class="grid grid-cols-3 gap-2 text-center text-xs">
          <a href="index.html" class="rounded-xl bg-brand px-2 py-2.5 font-semibold text-white transition hover:bg-brand-deep">Home</a>
          <a href="quiz.html" class="rounded-xl bg-brand-soft px-2 py-2.5 font-semibold text-brand transition hover:bg-brand/15">Quiz</a>
          <a href="list.html" class="rounded-xl bg-brand-soft px-2 py-2.5 font-semibold text-brand transition hover:bg-brand/15">Alfabet</a>
        </div>
      </div>
    </nav>
  </div>

  <script>
    const revealItems = document.querySelectorAll(".reveal");
    revealItems.forEach((item, index) => {
      setTimeout(() => {
        item.classList.remove("opacity-0", "translate-y-2");
      }, 90 * index);
    });
  </script>
</body>
</html>
